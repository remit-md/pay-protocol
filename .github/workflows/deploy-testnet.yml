name: Deploy Testnet

concurrency:
  group: deploy-testnet
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      script:
        description: "Forge script to run"
        required: true
        type: choice
        options:
          - DeployTestnet.s.sol
          - DeployTabV2Testnet.s.sol
          - DeployTabV3Testnet.s.sol
          - DeployTabV4Testnet.s.sol
          - DeployTabV5Testnet.s.sol
      dry_run:
        description: "Simulate only (no broadcast)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: testnet
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
        with:
          version: nightly-c07d504b4ae67754584f4e05ff0c547a43c50f7b

      - name: Build
        run: forge build

      - name: Run testnet deploy script
        env:
          FOUNDRY_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ALCHEMY_BASE_SEPOLIA_URL: ${{ secrets.ALCHEMY_BASE_SEPOLIA_URL }}
          # Existing contract addresses for incremental deploys (e.g. DeployTabV2Testnet)
          USDC_ADDRESS: "0x3A27F4136c51B12fA7326f4897F8E55db3922D32"
          PAY_FEE_ADDRESS: "0x11af2Bb838E65bC53712D13E1300009fA1A4327C"
        run: |
          FLAGS="--rpc-url $ALCHEMY_BASE_SEPOLIA_URL -vvvv"
          if [ "${{ inputs.dry_run }}" = "false" ]; then
            FLAGS="$FLAGS --broadcast --slow --verify --verifier blockscout --verifier-url https://base-sepolia.blockscout.com/api"
          fi
          forge script script/${{ inputs.script }} --private-key "$FOUNDRY_PRIVATE_KEY" $FLAGS

      - name: Upload broadcast artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: broadcast-testnet-${{ github.run_number }}
          path: broadcast/**/*.json
          retention-days: 90
