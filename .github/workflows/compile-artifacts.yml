name: Compile Artifacts

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10 # v1
        with:
          version: nightly-c07d504b4ae67754584f4e05ff0c547a43c50f7b

      - name: Build
        run: forge build

      - name: Extract deploy artifacts
        run: |
          mkdir -p artifacts
          for contract in PayFee PayDirect PayTab PayTabV2 PayTabV3 PayTabV4 PayTabV5 PayRouter; do
            jq '{abi: .abi, bytecode: .bytecode.object}' "out/${contract}.sol/${contract}.json" > "artifacts/${contract}.json"
          done
          # ERC1967Proxy from OpenZeppelin
          jq '{abi: .abi, bytecode: .bytecode.object}' "out/ERC1967Proxy.sol/ERC1967Proxy.json" > "artifacts/ERC1967Proxy.json"
          # Bundle all into one file for the deploy page
          jq -s '{PayFee: .[0], PayDirect: .[1], PayTab: .[2], PayTabV2: .[3], PayTabV3: .[4], PayTabV4: .[5], PayTabV5: .[6], PayRouter: .[7], ERC1967Proxy: .[8]}' \
            artifacts/PayFee.json artifacts/PayDirect.json artifacts/PayTab.json artifacts/PayTabV2.json artifacts/PayTabV3.json artifacts/PayTabV4.json artifacts/PayTabV5.json artifacts/PayRouter.json artifacts/ERC1967Proxy.json \
            > artifacts/deploy-bundle.json
          echo "=== Artifact sizes ==="
          ls -la artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deploy-artifacts
          path: artifacts/
          retention-days: 30
